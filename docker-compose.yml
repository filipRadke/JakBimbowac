services:
  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j/import:/import
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1;'"]
      interval: 5s
      retries: 20

  neo4j-init:
    image: neo4j:5
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./neo4j/import:/import
      - ./neo4j/init:/init
    entrypoint: ["/bin/bash", "/init/run_import.sh"]

  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tram
    ports:
      - "3306:3306"
    volumes:
      - ./mariadb/init:/docker-entrypoint-initdb.d
      - mariadb_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      - neo4j

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
  mariadb_data: